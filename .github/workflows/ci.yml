name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      update_visual_references:
        description: Generate reviewed visual references on the pinned Linux profile
        required: false
        default: false
        type: boolean

jobs:
  rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            managym -> target

      - name: Rust tests
        working-directory: managym
        run: cargo test

  python-unit:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --python 3.12 --extra dev

      - name: Run unit tests
        run: uv run --python 3.12 --extra dev pytest tests/infra/ tests/ops/

  integration:
    name: Integration (${{ matrix.os }})
    needs: [rust]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            managym -> target

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'

      - name: Cache uv downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml', 'managym/pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --python 3.12 --extra dev --extra play

      - name: Build managym extension
        run: uv run --python 3.12 --extra play maturin develop --features python --manifest-path managym/Cargo.toml

      - name: Integration tests
        run: |
          uv run --python 3.12 --extra dev pytest tests/env/ tests/agent/ tests/model/ \
            tests/sim/test_structured_policy.py \
            tests/bench/test_structured_policy_benchmark.py

      - name: Enum smoke test
        run: uv run --python 3.12 python -c "import managym; assert int(managym.ZoneEnum.STACK) == 4"

      - name: Training smoke test
        run: |
          uv run --python 3.12 python manabot/model/train.py \
            --set train.total_timesteps=128 \
            --set train.num_envs=2 \
            --set train.num_steps=8 \
            --set train.update_epochs=1 \
            --set train.num_minibatches=1 \
            --set experiment.wandb=false \
            --set experiment.profiler_enabled=false \
            --set agent.attention_on=false

  protocol-v1:
    name: Protocol v1 Conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          uv venv .venv --python 3.12
          uv sync --extra dev

      - name: Build Python extension
        run: uv run --python 3.12 --extra play maturin develop --release --manifest-path managym/Cargo.toml --features python

      - name: Certify Rust and Python
        run: |
          cargo test --manifest-path managym/Cargo.toml --test experience_protocol_tests
          uv run --extra dev pytest tests/gui/test_experience_protocol.py -q
          uv run --extra dev pytest tests/gui/test_server.py -k protocol_v1 -q

      - name: Certify TypeScript
        working-directory: frontend
        run: |
          npm ci
          npm test -- --run src/lib/protocol-conformance.test.ts
          npm run check

  semantic-coverage:
    name: Semantic Coverage Gate
    needs: [rust]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.12
          uv sync --extra dev

      - name: Check semantic coverage evidence
        run: |
          uv run pytest tests/semantic/test_compiler.py tests/semantic/test_coverage_gate.py tests/semantic/test_opcode_alignment.py -q
          uv run scripts/generate_coverage_gaps.py --check

  semantic-conformance:
    name: Semantic Kernel Conformance
    needs: [rust]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            managym -> target

      - name: Check replay, property, and metamorphic evidence
        run: cargo test --locked --manifest-path managym/Cargo.toml --test semantic_conformance_tests

      - name: Reproduce checked conformance artifacts
        run: cargo run --locked --manifest-path managym/Cargo.toml --bin semantic_conformance -- check --root conformance/semantic-kernel-v1

      - name: Run bounded valid-action fuzzing
        run: cargo run --locked --manifest-path managym/Cargo.toml --bin semantic_conformance -- fuzz --root conformance/semantic-kernel-v1 --seed 24301 --cases 32 --max-commands 512 --failure-dir target/semantic-conformance/failures

      - name: Preserve exact fuzz replay seeds
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: semantic-conformance-failures
          path: target/semantic-conformance/failures/*.json
          if-no-files-found: ignore

  visual_reference:
    name: Visual Reference Gate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          uv venv .venv --python 3.12
          uv export --quiet --frozen --extra dev --no-emit-project \
            --prune torch --prune pandas --prune typer --prune psutil \
            --prune httpx --prune jsonschema --prune ruff --prune boto3 \
            --output-file /tmp/visual-requirements.txt
          uv pip install --python .venv/bin/python \
            --requirements /tmp/visual-requirements.txt maturin==1.11.5
          uv pip install --python .venv/bin/python \
            --default-index https://download.pytorch.org/whl/cpu torch==2.10.0

      - name: Build Python extension
        run: uv run --no-sync maturin develop --release --manifest-path managym/Cargo.toml --features python

      - name: Install frontend and Chromium
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Compare committed visual references
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.update_visual_references }}
        run: |
          uv run --no-sync pytest tests/gui/test_release_prompt_matrix.py -q
          npm --prefix frontend run test:e2e:release

      - name: Generate visual reference artifact
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_visual_references }}
        run: |
          npm --prefix frontend run test:e2e:release -- --update-snapshots
          uv run --no-sync pytest tests/gui/test_release_prompt_matrix.py -q
          npm --prefix frontend run test:e2e:release

      - name: Upload generated visual references
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_visual_references }}
        uses: actions/upload-artifact@v4
        with:
          name: visual-references-v1
          path: frontend/e2e/visual-references/v1
          if-no-files-found: error

      - name: Upload visual failure evidence
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: visual-reference-failure
          path: frontend/test-results/release
          if-no-files-found: warn

  clean-machine-play:
    name: Clean-machine Play
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv and CPython 3.12
        uses: astral-sh/setup-uv@v6
        with:
          version: '0.9.22'
          python-version: '3.12'
          enable-cache: false

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Provision proof Chromium
        run: npx --yes playwright@1.61.1 install --with-deps chromium

      - name: Prove clean launch and offline reload
        run: ./scripts/verify-clean-machine

      - name: Upload clean-machine receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clean-machine-play
          path: |
            .cache/clean-machine/proof.json
            .cache/clean-machine/launch.log
          if-no-files-found: warn

  result:
    name: Tests Result
    runs-on: ubuntu-latest
    needs: [rust, python-unit, integration, protocol-v1, semantic-coverage, semantic-conformance, visual_reference, clean-machine-play]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          echo "rust: ${{ needs.rust.result }}"
          echo "python-unit: ${{ needs.python-unit.result }}"
          echo "integration: ${{ needs.integration.result }}"
          echo "protocol-v1: ${{ needs.protocol-v1.result }}"
          echo "semantic-coverage: ${{ needs.semantic-coverage.result }}"
          echo "semantic-conformance: ${{ needs.semantic-conformance.result }}"
          echo "visual_reference: ${{ needs.visual_reference.result }}"
          echo "clean-machine-play: ${{ needs.clean-machine-play.result }}"
          if [ "${{ needs.rust.result }}" != "success" ] || \
             [ "${{ needs.python-unit.result }}" != "success" ] || \
             [ "${{ needs.integration.result }}" != "success" ] || \
             [ "${{ needs.protocol-v1.result }}" != "success" ] || \
             [ "${{ needs.semantic-coverage.result }}" != "success" ] || \
             [ "${{ needs.semantic-conformance.result }}" != "success" ] || \
             [ "${{ needs.visual_reference.result }}" != "success" ] || \
             [ "${{ needs.clean-machine-play.result }}" != "success" ]; then
            exit 1
          fi
