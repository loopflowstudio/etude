app = "etude-website"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "5002"

[http_service]
  internal_port = 5002
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
